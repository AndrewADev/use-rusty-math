version = 1
revision = 3
requires-python = ">=3.12"

[[package]]
name = "rusty-math"
source = { directory = "../rusty-math" }

[package.metadata]
requires-dist = [{ name = "pytest", marker = "extra == 'dev'" }]
provides-extras = ["dev"]

[package.metadata.requires-dev]
dev = [
    { name = "maturin", specifier = ">=1.13,<2.0" },
    { name = "pytest", specifier = ">=8.3.5" },
]

[[package]]
name = "use-rusty-math"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "rusty-math" },
]

[package.metadata]
requires-dist = [{ name = "rusty-math", directory = "../rusty-math" }]
